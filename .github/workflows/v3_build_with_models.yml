name: V3 Build & Release APK (Models Download on First Launch)

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt || echo "requirements.txt skipped"

      - name: Python syntax check
        run: |
          python -m py_compile main.py cli.py || true
          find . -name "*.py" -not -path "./.venv/*" -not -path "./.buildozer/*" -not -path "./.git/*" | xargs python -m py_compile
          echo "✓ All Python files valid"

  build-apk:
    needs: verify
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Get commit info
        id: commit
        run: |
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "commit_message=$(git log -1 --format=%B)" >> $GITHUB_OUTPUT
          echo "build_date=$(date +'%Y-%m-%d_%H-%M-%S')" >> $GITHUB_OUTPUT

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip ninja-build \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget clang

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome
          pip install -r requirements_mobile.txt 2>/dev/null || pip install -r requirements.txt
          echo "✓ Build dependencies installed"

      - name: Clean previous builds
        run: |
          rm -rf .buildozer bin dist build 2>/dev/null || true
          mkdir -p bin
          echo "✓ Previous builds cleaned"

      - name: Build Release APK
        env:
          BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
          BUILDOZER_LOG_LEVEL: 2
        run: |
          echo "Starting buildozer android release..."
          buildozer android release -v 2>&1 | tee build.log
          echo "✓ Build completed"

      - name: Check build output
        if: always()
        run: |
          echo "Build artifacts:"
          if [ -d "bin" ] && [ -n "$(ls -A bin/ 2>/dev/null)" ]; then
            ls -lh bin/
            echo "✓ Found APK files"
          else
            echo "No bin directory or APK files found"
            find .buildozer -name "*.apk" 2>/dev/null | head -5 || echo "No APK found"
          fi

      - name: Generate release notes
        id: release_notes
        run: |
          cat > RELEASE_NOTES.md << 'EOF'
          # O-RAG v3 Build - ${{ steps.commit.outputs.build_date }}

          **Build Configuration:**
          - Branch: v3
          - Commit: ${{ steps.commit.outputs.commit_hash }}
          - Model Download: First Launch (On-Demand)
          
          **Models (Auto-Downloaded on First Launch):**
          - ✅ Qwen 3.5-2B Q4_K_M (1.3 GB) from bartowski
          - ✅ Nomic Embed Text v1.5 Q4_K_M (~80 MB)
          
          **Features:**
          - 🎨 Material Design 3 UI
          - 📥 Models download automatically on first launch (~5-10 min)
          - 💾 Automatic memory management
          - 🔍 Document RAG with semantic search
          - ⚡ Optimized for 4GB+ Android devices
          - 🤖 Latest Qwen 3.5 AI model

          **Installation:**
          ```bash
          adb install orag-*.apk
          ```

          **First Launch:**
          1. App opens InitScreen
          2. Models download from HuggingFace (requires internet)
          3. Once downloaded (~5-10 minutes), app works fully offline
          4. Chat & RAG ready to use
          5. All future launches: instant load

          **System Requirements:**
          - Android 8+ (API 26+)
          - 4GB RAM minimum
          - Internet connection for first-time model download
          - ~1.4 GB free storage for models

          **Build Details:**
          - Commit: ${{ steps.commit.outputs.commit_message }}
          - Engine: llama.cpp Python with Rust optimizations
          - Build Date: ${{ steps.commit.outputs.build_date }}
          EOF
          cat RELEASE_NOTES.md

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3-build-${{ steps.commit.outputs.build_date }}
          name: V3 Build - ${{ steps.commit.outputs.build_date }}
          body_path: RELEASE_NOTES.md
          files: bin/orag-*.apk
          draft: false
          prerelease: false
          target_commitish: v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
