name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            git zip unzip ninja-build \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            wget lld clang
            
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer pycryptodome
          pip install -r requirements.txt 2>&1 | tail -20 || true
          
      - name: Accept Android licenses
        run: |
          mkdir -p ~/.android/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7973335447fc6c3b3d07e678066c" > ~/.android/licenses/android-sdk-preview-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/licenses/android-sdk-preview-license-old
          chmod 644 ~/.android/licenses/*
          
      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: ccache-${{ runner.os }}-
          
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            /tmp/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-

      - name: Clone llama.cpp source
        run: |
          git clone --depth 1 https://github.com/ggml-org/llama.cpp.git /tmp/llama_cpp_src
          echo "llama.cpp cloned: $(ls /tmp/llama_cpp_src | head -20)"

      - name: Build base APK (without llama bindings)
        env:
          GRADLE_OPTS: "-Xmx4g -XX:MaxMetaspaceSize=512m"
        run: |
          java -version
          unset PYTHONHOME PYTHONPATH
          rm -rf .buildozer/android/platform/build-arm64-v8a/build/other_builds/hostpython3 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a/build/other_builds/hostpython3 2>/dev/null || true
          rm -rf .buildozer/android/platform/build-arm64-v8a/dists/ 2>/dev/null || true
          rm -rf ~/.buildozer/android/platform/build-arm64-v8a/dists/ 2>/dev/null || true
          rm -rf .buildozer/android/app 2>/dev/null || true
          mkdir -p ~/.android && touch ~/.android/repositories.cfg
          
          # Remove llama_cpp_python from requirements temporarily - we'll compile separately
          sed -i '/llama_cpp_python/d' buildozer.spec
          
          # Use debug mode to generate APK (not AAB bundled format)
          # We'll strip and sign separately if needed
          yes 2>/dev/null | buildozer android debug 2>&1 | tee build.log
          exit ${PIPESTATUS[1]}
          
      - name: Compile llama-server for Android ARM64
        run: |
          set -e
          
          NDK_HOME=$(find $HOME/.buildozer/android/platform -maxdepth 1 \
            -name "android-ndk-*" -type d | head -1)
          TOOLCHAIN="$NDK_HOME/build/cmake/android.toolchain.cmake"
          
          echo "NDK: $NDK_HOME"
          echo "Toolchain: $TOOLCHAIN"
          
          if [ ! -f "$TOOLCHAIN" ]; then
            echo "FATAL: Android NDK toolchain not found!"
            exit 1
          fi
          
          cmake -S /tmp/llama_cpp_src -B llama_build \
            -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$TOOLCHAIN" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-28 \
            -DCMAKE_BUILD_TYPE=MinSizeRel \
            -DGGML_NATIVE=OFF \
            -DGGML_OPENMP=OFF \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_CURL=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DLLAMA_SERVER_VERBOSE=OFF
          
          cmake --build llama_build --target llama-server -j$(nproc)
          
          BIN=$(find llama_build -name "llama-server" -type f 2>/dev/null | head -1)
          if [ -z "$BIN" ]; then
            echo "ERROR: llama-server not found"
            find llama_build -type f 2>/dev/null | head -20
            exit 1
          fi
          
          cp "$BIN" llama-server-arm64
          chmod 755 llama-server-arm64
          
          STRIP="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          if [ -f "$STRIP" ]; then
            "$STRIP" --strip-unneeded llama-server-arm64
          fi
          
          echo "llama-server-arm64: $(du -sh llama-server-arm64)"

      - name: Download GGUF models
        run: |
          pip install huggingface-hub --quiet
          python3 - <<'PYEOF'
          import os
          from huggingface_hub import hf_hub_download
          
          # Qwen 3.5 generation model - download for reference/testing only
          # NOTE: Not bundled in APK; app downloads on first launch
          qwen_path = hf_hub_download(
              repo_id="Qwen/Qwen3.5-1B-Instruct-GGUF",
              filename="Qwen3.5-1B-Instruct-Q4_K_M.gguf",
              local_dir="model_cache",
              local_dir_use_symlinks=False,
          )
          print(f"Qwen 3.5 (reference): {os.path.getsize(qwen_path)//1_048_576} MB")
          
          # UAE-Small-v1 embedding model - download for reference/testing only
          uae_path = hf_hub_download(
              repo_id="Xenova/clip-vit-base-patch32-ggml",
              filename="ggml-model-q4_k_m.gguf",
              local_dir="model_cache",
              local_dir_use_symlinks=False,
          )
          print(f"CLIP ViT-B32 Multimodal (reference): {os.path.getsize(uae_path)//1_048_576} MB")
          
          print("\nNOTE: Models are NOT bundled in APK.")
          print("App will download to device storage on first launch.")
          PYEOF

      - name: Patch APK with llama-server (no models)
        run: |
          python3 - <<'PYEOF'
          import zipfile, glob, os, sys
          
          apk_list = glob.glob("bin/*.apk")
          if not apk_list:
              print("ERROR: No APK found in bin/")
              print("Contents of bin/:", os.listdir("bin") if os.path.exists("bin") else "bin/ does not exist")
              print("\nThis means buildozer failed to generate APK. Check build.log for details.")
              sys.exit(1)
          
          apk = apk_list[0]
          srv = "llama-server-arm64"
          tmp = apk + ".tmp"
          CHUNK = 4 * 1024 * 1024
          
          if not os.path.exists(srv):
              print(f"ERROR: {srv} not found!")
              print("Current directory contents:", os.listdir("."))
              sys.exit(1)
          
          print(f"APK: {apk} ({os.path.getsize(apk)//1_048_576} MB)")
          print(f"Binary: {srv} ({os.path.getsize(srv)//1024} KB)")
          print("\nPatching APK (adding llama-server only, no models)...")
          
          with zipfile.ZipFile(apk, "r") as src, \
               zipfile.ZipFile(tmp, "w", compression=zipfile.ZIP_DEFLATED, allowZip64=True) as dst:
              
              # Copy all existing entries (keep META-INF for signature!)
              # Only skip asset models if they exist
              for item in src.infolist():
                  if item.filename.startswith("assets/models/"):
                      continue
                  dst.writestr(item, src.read(item.filename))
              
              # Add binary as native library (so Android extracts at install)
              print("Adding lib/arm64-v8a/libllama_server.so...")
              bi = zipfile.ZipInfo("lib/arm64-v8a/libllama_server.so")
              bi.compress_type = zipfile.ZIP_STORED
              bi.external_attr = 0o755 << 16
              with open(srv, "rb") as bf, dst.open(bi, "w") as zo:
                  while chunk := bf.read(CHUNK):
                      zo.write(chunk)
          
          os.replace(tmp, apk)
          final_size = os.path.getsize(apk)
          print(f"\nFinal APK: {final_size//1_048_576} MB")
          
          # Verify contents
          with zipfile.ZipFile(apk, 'r') as vf:
              names = vf.namelist()
              print("\nAPK contents check:")
              
              # Check llama-server
              found_lib = "lib/arm64-v8a/libllama_server.so" in names
              print(f"  {'✓' if found_lib else '✗'} llama-server binary")
              
              # Verify NO models embedded
              model_files = [n for n in names if n.startswith("assets/models/")]
              if model_files:
                  print(f"  ✗ UNEXPECTED: {len(model_files)} model files found in APK!")
                  for m in model_files:
                      print(f"     - {m}")
              else:
                  print(f"  ✓ No models embedded (will download on first app launch)")
          PYEOF

      - name: Re-sign patched APK
        run: |
          # Find debug keystore or create one
          KEYSTORE="$HOME/.android/debug.keystore"
          if [ ! -f "$KEYSTORE" ]; then
            echo "Creating debug keystore..."
            keytool -genkey -v -keystore "$KEYSTORE" -keyalg RSA -keysize 2048 \
              -validity 10000 -alias androiddebugkey \
              -storepass android -keypass android \
              -dname "CN=Android, OU=Android, O=Android, L=Android, S=Android, C=US"
          fi
          
          # Find apksigner
          APKSIGNER=$(find ~/.buildozer/android/platform -name "apksigner.jar" 2>/dev/null | head -1)
          if [ -z "$APKSIGNER" ]; then
            echo "WARNING: apksigner not found, trying jarsigner instead..."
            APK=$(find bin -name "*.apk" -type f | head -1)
            jarsigner -verbose -sigalg SHA1withRSA -digestalg SHA1 \
              -keystore "$KEYSTORE" -storepass android -keypass android \
              "$APK" androiddebugkey
          else
            echo "Using apksigner to re-sign APK..."
            APK=$(find bin -name "*.apk" -type f | head -1)
            java -jar "$APKSIGNER" sign --ks "$KEYSTORE" --ks-pass pass:android "$APK"
          fi
          
          echo "APK re-signed successfully"

      - name: Verify APK structure
        run: |
          python3 - <<'PYEOF'
          import zipfile, os
          apks = [f for f in os.listdir("bin") if f.endswith(".apk")]
          if not apks:
              print("ERROR: No APK found!")
              exit(1)
          apk = os.path.join("bin", apks[0])
          with zipfile.ZipFile(apk, 'r') as z:
              print(f"APK: {apk} ({os.path.getsize(apk)//1_048_576}MB)")
              print(f"Files: {len(z.namelist())}")
              has_llama = any("libllama_server" in n for n in z.namelist())
              has_manifest = "AndroidManifest.xml" in z.namelist()
              print(f"  ✓ llama-server binary" if has_llama else "  ✗ MISSING: llama-server binary")
              print(f"  ✓ AndroidManifest.xml" if has_manifest else "  ✗ MISSING: AndroidManifest.xml")
              # List lib files
              libs = sorted([n for n in z.namelist() if n.startswith("lib/")])
              if libs:
                  print(f"  Libraries ({len(libs)} total):")
                  for lib in libs[:10]:
                      print(f"    - {lib}")
                  if len(libs) > 10:
                      print(f"    ... and {len(libs)-10} more")
          PYEOF

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: orag-apk-${{ github.run_number }}
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      - name: Upload build log (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
