name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "Main requirements installed"
          pip install -r requirements_mobile.txt || echo "Mobile requirements installed"

      - name: Build APK
        run: |
          rm -rf .buildozer bin dist 2>/dev/null || true
          mkdir -p bin
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export ANDROID_NDK_ROOT=$HOME/Android/Ndk
          echo "Starting buildozer build..."
          buildozer android release -v 2>&1 | tee build.log || BUILD_FAILED=1
          if [ -z "$BUILD_FAILED" ]; then
            echo "✓ Build completed successfully"
          else
            echo "✗ Build failed, see details above"
          fi
          echo "BUILD_FAILED=$BUILD_FAILED" >> $GITHUB_ENV

      - name: Check APK output
        if: always()
        run: |
          echo "=== Build Diagnostics ===" 
          echo "Checking bin directory..."
          if [ -d "bin" ]; then
            echo "✓ bin directory exists"
            ls -lha bin/ || echo "Failed to list bin"
          else
            echo "✗ bin directory not found"
          fi
          
          echo ""
          echo "Searching for APK files..."
          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK file(s) total"
          
          if [ $APK_COUNT -gt 0 ]; then
            echo "✓ APK files found:"
            find . -name "*.apk" -type f 2>/dev/null | head -10
            
            # Move all APK files to bin if not already there
            find . -name "*.apk" -type f ! -path "./bin/*" -exec cp {} bin/ \;
          else
            echo "✗ No APK files found anywhere"
            echo ""
            echo "Last 30 lines of build.log:"
            tail -30 build.log || echo "No build.log found"
          fi
          
          # Final check
          ls -lh bin/*.apk 2>/dev/null || echo "No APK files in bin/"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          tag_name: v3-build-${{ github.run_number }}-${{ github.run_attempt }}
          name: V3 Build #${{ github.run_number }}
          files: bin/*.apk
          generate_release_notes: false
          body: |
            # O-RAG v3 - Automated APK Build
            
            **Models (Download on First Launch):**
            - Qwen 3.5-2B Instruct Q4_K_M (~1.3 GB)
            - Nomic Embed Text v1.5 Q4_K_M (~80 MB)
            
            **Installation:**
            ```bash
            adb install bin/orag-*-release-unsigned.apk
            ```
            
            **First Run:**
            App will automatically download AI models (~5-10 min), then operates fully offline.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare APK for upload
        if: always()
        run: |
          echo "Finding APK files for upload..."
          mkdir -p artifacts
          
          if [ -d "bin" ]; then
            APK_FOUND=$(find bin -maxdepth 1 -name "*.apk" -type f 2>/dev/null | wc -l)
            if [ $APK_FOUND -gt 0 ]; then
              echo "Found $APK_FOUND APK(s) in bin/"
              cp bin/*.apk artifacts/ 2>/dev/null
            fi
          fi
          
          # Also check .buildozer directory
          BUILDOZER_APK=$(find .buildozer -name "*.apk" -type f 2>/dev/null | head -1)
          if [ ! -z "$BUILDOZER_APK" ]; then
            echo "Found APK in buildozer: $BUILDOZER_APK"
            cp "$BUILDOZER_APK" artifacts/
          fi
          
          # List what we're uploading
          echo ""
          echo "Files to upload:"
          ls -lh artifacts/ || echo "No files in artifacts/"

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orag-apk-${{ github.run_number }}
          path: artifacts/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Status: ${{ job.status }}"
          echo "Run: ${{ github.run_number }}"
          echo "Branch: v3"
          echo ""
          
          ARTIFACT_COUNT=$(find artifacts -name "*.apk" 2>/dev/null | wc -l)
          if [ $ARTIFACT_COUNT -gt 0 ]; then
            echo "✓ APK Successfully Built and Packaged"
            echo "Artifact Count: $ARTIFACT_COUNT"
            ls -lh artifacts/*.apk 2>/dev/null | awk '{print "  Size:", $5, "File:", $9}'
            echo ""
            echo "✓ APK available in: Artifacts → orag-apk-${{ github.run_number }}"
          else
            echo "⚠ APK not found in artifacts/"
            echo "Checking all locations..."
            find . -name "*.apk" -type f 2>/dev/null | head -5
          fi
