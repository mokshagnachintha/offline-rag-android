name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev \
            expect xvfb ccache
            
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37"
          pip install buildozer pycryptodome
          pip install -r requirements.txt 2>&1 | tail -20 || true
          
      - name: Accept Android licenses
        run: |
          mkdir -p ~/.android/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7973335447fc6c3b3d07e678066c" > ~/.android/licenses/android-sdk-preview-license
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > ~/.android/licenses/android-sdk-preview-license-old
          chmod 644 ~/.android/licenses/*
          ls -la ~/.android/licenses/
          
      - name: Set up ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.run_number }}
          restore-keys: ccache-${{ runner.os }}-
          
      - name: Cache buildozer packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            /tmp/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
          
      - name: Build APK
        run: |
          set +e
          
          echo "=========================================="
          echo "Building O-RAG APK - Run #${{ github.run_number }}"
          echo "=========================================="
          echo ""
          
          # Clean build directories
          rm -rf .buildozer dist bin *.log 2>/dev/null || true
          mkdir -p bin
          
          # Export environment variables for license acceptance
          export BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export ANDROID_NDK_ROOT=$HOME/Android/Ndk
          
          # Copy custom recipes to buildozer's recipe cache
          # Buildozer looks for recipes in ~/.buildozer/android/platform/recipes-sources
          echo "Setting up custom recipes..."
          mkdir -p ~/.buildozer/android/platform/recipes-sources
          cp -r p4a-recipes/* ~/.buildozer/android/platform/recipes-sources/ 2>/dev/null || true
          ls -la ~/.buildozer/android/platform/recipes-sources/ || echo "Recipe copy failed, will try alternate method"
          
          # Pre-accept licenses one more time during build
          mkdir -p ~/.android/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          
          # Create wrapper script to auto-accept all prompts
          cat > run_buildozer.sh << 'SCRIPT'
          #!/bin/bash
          (
            echo y
            echo y
            echo y
            sleep 2
            yes
          ) | buildozer android release -v 2>&1
          SCRIPT
          chmod +x run_buildozer.sh
          
          # Run build with timeout and automatic responses
          timeout 5400 ./run_buildozer.sh | tee buildozer.log
          BUILD_EXIT=$?
          
          echo ""
          echo "Build process exit code: $BUILD_EXIT"
          
      - name: Find and stage APK
        if: always()
        run: |
          mkdir -p release
          
          echo "Searching for APK files..."
          echo ""
          
          # Search in all possible locations
          find . -name "*.apk" -type f ! -path "./.git/*" ! -path "./.buildozer/cache/*" -print0 2>/dev/null | while IFS= read -r -d '' file; do
            echo "Found: $file"
            cp "$file" release/
          done
          
          echo ""
          echo "APKs in staging directory:"
          ls -lh release/ 2>/dev/null || echo "No APKs found!"
          
          # Save exit code for later
          if [ -f release/*.apk ]; then
            echo "APK_FOUND=1" >> $GITHUB_ENV
            ls -1 release/*.apk | head -1 | xargs -I {} basename {} | tee apk_name.txt
          else
            echo "APK_FOUND=0" >> $GITHUB_ENV
            echo "No APK found in release directory"
            echo ""
            echo "Directory structure:"
            find . -maxdepth 4 -type d -name "dist" -o -name "bin" | head -5
            echo ""
            echo "Last 50 lines of buildozer log:"
            tail -50 buildozer.log 2>/dev/null || echo "No log found"
          fi
          
      - name: Upload APK artifact
        if: env.APK_FOUND == '1'
        uses: actions/upload-artifact@v4
        with:
          name: orag-apk-${{ github.run_number }}
          path: release/
          retention-days: 30
          if-no-files-found: error
          
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: buildozer.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Run: #${{ github.run_number }}"
          
          if [ -f release/*.apk ]; then
            echo ""
            echo "✓ APK READY FOR DOWNLOAD"
            echo "Artifacts: orag-apk-${{ github.run_number }}"
            ls -lh release/
          else
            echo ""
            echo "✗ Build finished but no APK generated"
            echo ""
            echo "Check build log: build-log-${{ github.run_number }}"
            if [ -f buildozer.log ]; then
              echo ""
              echo "Last 30 lines of build log:"
              tail -30 buildozer.log
            fi
          fi
