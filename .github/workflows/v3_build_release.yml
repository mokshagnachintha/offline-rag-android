name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev expect

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "Main requirements installed"
          pip install -r requirements_mobile.txt || echo "Mobile requirements installed"

      - name: Pre-accept Android SDK licenses
        run: |
          echo "Creating Android license files in all expected locations..."
          
          # Create ~/.android/licenses
          mkdir -p ~/.android/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7973335447fc6c3b3d07e678066c" > ~/.android/licenses/android-sdk-preview-license
          
          chmod 644 ~/.android/licenses/*
          echo "✓ License files created"
          ls -la ~/.android/licenses/
          
          export ANDROID_LICENSES=true

      - name: Build APK with automatic license acceptance
        run: |
          rm -rf .buildozer bin dist 2>/dev/null || true
          mkdir -p bin
          
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export ANDROID_NDK_ROOT=$HOME/Android/Ndk
          export BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1
          
          echo "======================================"
          echo "APK Build #${{ github.run_number }}"
          echo "======================================"
          echo "Using Python: $(python --version)"
          echo ""
          
          # Ensure licenses exist before buildozer runs
          mkdir -p ~/.android/licenses
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7973335447fc6c3b3d07e678066c" > ~/.android/licenses/android-sdk-preview-license
          
          # Create expect script to handle interactive prompts
          cat > /tmp/buildozer_expect.exp << 'EOF'
          #!/usr/bin/expect -f
          set timeout 5400
          set cmd "buildozer android release -v"
          
          spawn bash -c $cmd
          
          # Handle all yes/no prompts
          expect {
            -re "Accept\?" {send "y\r"; exp_continue}
            -re "y/N" {send "y\r"; exp_continue}
            -re "Do you" {send "y\r"; exp_continue}
            eof {catch wait result; exit [lindex $result 3]}
          }
          EOF
          
          chmod +x /tmp/buildozer_expect.exp
          
          # Run buildozer with expect for reliable prompt handling
          echo "Starting build with expect-based license acceptance..."
          expect /tmp/buildozer_expect.exp 2>&1 | tee build.log
          BUILD_EXIT=${PIPESTATUS[0]}
          
          echo ""
          echo "Build finished with exit code: $BUILD_EXIT"
          
          # Check if APK was actually generated (success indicator)
          if find . -name "*release*.apk" ! -path "./.buildozer/cache/*" 2>/dev/null | grep -q .; then
            echo "✓ APK FILE FOUND - BUILD SUCCESSFUL"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          elif [ $BUILD_EXIT -eq 0 ]; then
            echo "✓ BUILD EXITED CLEANLY (exit code 0)"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "✗ BUILD FAILED with exit code $BUILD_EXIT"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            echo ""
            echo "=== Last 40 lines of build log ==="
            tail -40 build.log
          fi

      - name: Locate and verify APK
        run: |
          echo "=== Searching for APK files ==="
          
          # Create staging directory
          mkdir -p apk-release
          
          # Find all APK files (various locations)
          find . -name "*release*.apk" -type f ! -path "./.buildozer/cache/*" -exec cp {} apk-release/ \; 2>/dev/null || true
          find . -name "orag*.apk" -type f ! -path "./.buildozer/cache/*" -exec cp {} apk-release/ \; 2>/dev/null || true
          
          # Search specifically in buildozer dist directories
          find .buildozer -type d -name "dist" 2>/dev/null | while read dist_dir; do
            echo "Checking dist dir: $dist_dir"
            find "$dist_dir" -name "*.apk" -type f -exec cp {} apk-release/ \; 2>/dev/null || true
          done
          
          # List what we found
          echo ""
          echo "APK files in staging directory:"
          if [ -f apk-release/*.apk ]; then
            ls -lh apk-release/*.apk
            APK_COUNT=$(find apk-release -name "*.apk" 2>/dev/null | wc -l)
            echo "Total APKs found: $APK_COUNT"
            echo "APK_FOUND=true" >> $GITHUB_ENV
          else
            echo "❌ NO APK FILES FOUND"
            echo "APK_FOUND=false" >> $GITHUB_ENV
            echo ""
            echo "=== Build directory contents ==="
            find . -maxdepth 3 -name "*.apk" 2>/dev/null | head -10 || echo "No APKs found anywhere"
          fi

      - name: Upload APK as GitHub Artifact
        if: env.APK_FOUND == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: orag-release-apk-${{ github.run_number }}
          path: apk-release/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-${{ github.run_number }}
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Run: #${{ github.run_number }}"
          echo "Status: ${{ job.status }}"
          echo "Build Success: ${BUILD_SUCCESS:-unknown}"
          
          if [ "$BUILD_SUCCESS" = "true" ]; then
            echo ""
            echo "✓ APK READY"
            echo "Download: Actions → orag-release-apk-${{ github.run_number }}"
          else
            echo ""
            echo "✗ Build failed, check logs"
            if [ -f build.log ]; then
              echo ""
              echo "Last 50 lines:"
              tail -50 build.log
            fi
          fi
