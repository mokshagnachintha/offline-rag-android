name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "Main requirements installed"
          pip install -r requirements_mobile.txt || echo "Mobile requirements installed"

      - name: Build APK
        run: |
          rm -rf .buildozer bin dist 2>/dev/null || true
          buildozer android release -v

      - name: Check APK output
        run: |
          if [ -f "bin/orag-"*"-release-unsigned.apk" ]; then
            ls -lh bin/orag-*-release-unsigned.apk
          else
            echo "Build failed - APK not found in bin/"
            exit 1
          fi

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v3-build-${{ github.run_number }}
          name: V3 Build #${{ github.run_number }}
          files: bin/orag-*-release-unsigned.apk
          body: |
            # O-RAG v3 - Automated APK Build
            
            **Models (Download on First Launch):**
            - Qwen 3.5-2B Instruct Q4_K_M (~1.3 GB)
            - Nomic Embed Text v1.5 Q4_K_M (~80 MB)
            
            **Installation:**
            ```bash
            adb install bin/orag-*-release-unsigned.apk
            ```
            
            **First Run:**
            App will automatically download AI models (~5-10 min), then operates fully offline.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
