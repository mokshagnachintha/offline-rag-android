name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "Main requirements installed"
          pip install -r requirements_mobile.txt || echo "Mobile requirements installed"

      - name: Pre-accept Android SDK licenses (critical step)
        run: |
          echo "Pre-accepting Android SDK licenses using yes command..."
          
          # Download SDK command-line tools first
          mkdir -p ~/.android-sdk-temp
          cd ~/.android-sdk-temp
          
          # Download command-line tools
          if [ ! -f "cmdlinetools.zip" ]; then
            curl -L -o cmdlinetools.zip "https://dl.google.com/android/repository/commandlinetools-linux-6514223_latest.zip"
          fi
          
          if [ -f "cmdlinetools.zip" ]; then
            unzip -qo cmdlinetools.zip
            
            # Accept licenses with 'yes' command
            mkdir -p ~/.android/licenses
            yes | ./cmdline-tools/bin/sdkmanager --sdk_root=$HOME/.android --licenses 2>&1 | head -100 || true
            
            echo "✓ Licenses acceptance attempted"
            ls -la ~/.android/licenses/
          fi

      - name: Accept Android SDK licenses (pre-build setup)
        run: |
          echo "Setting up Android SDK license acceptance..."
          
          # Create .gradle directory with custom settings
          mkdir -p ~/.gradle
          cat > ~/.gradle/gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx1024m
          EOF
          
          # Create license files in home directory with ALL license hashes
          mkdir -p ~/.android/licenses
          
          # All possible Android SDK license hashes
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/android-sdk-license
          echo "504667f4c0de7973335447fc6c3b3d07e678066c" > ~/.android/licenses/android-sdk-preview-license
          echo "129e256904b56848df64501b5ed41250192f32e6" > ~/.android/licenses/google-gdk-license
          echo "dfaf6d33d4f163b9e23e234d547c6a31ec42d632" > ~/.android/licenses/mips-android-system-image-license
          echo "887daf51f8dce29c925d26ce98a02dd0b7f92d22" > ~/.android/licenses/intel-android-system-image-license
          echo "79bb43eaa2624fc1708a847bd1d61d0f5c2d8d3c" > ~/.android/licenses/arm-linux-androideabi-ndk-license
          
          # Create additional license files that might be needed
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/ndk-license
          echo "d56f5187479451eabf01fb78af6dfcb131b33910" > ~/.android/licenses/platforms-license
          
          echo "✓ License files created in ~/.android/licenses/:"
          ls -la ~/.android/licenses/
          
          export BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1
          echo "BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1" >> $GITHUB_ENV

      - name: Build APK
        run: |
          rm -rf .buildozer bin dist 2>/dev/null || true
          mkdir -p bin
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export ANDROID_NDK_ROOT=$HOME/Android/Ndk
          export BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE=1
          
          echo "======================================"
          echo "Starting APK Build"
          echo "======================================"
          echo "Python version: $(python --version)"
          echo "Buildozer version: $(buildozer --version)"
          echo ""
          
          # Function to create ALL license files
          setup_all_licenses() {
            local sdk_path="$1"
            mkdir -p "${sdk_path}/licenses"
            
            echo "d56f5187479451eabf01fb78af6dfcb131b33910" > "${sdk_path}/licenses/android-sdk-license"
            echo "504667f4c0de7973335447fc6c3b3d07e678066c" > "${sdk_path}/licenses/android-sdk-preview-license"
            echo "129e256904b56848df64501b5ed41250192f32e6" > "${sdk_path}/licenses/google-gdk-license"
            echo "dfaf6d33d4f163b9e23e234d547c6a31ec42d632" > "${sdk_path}/licenses/mips-android-system-image-license"
            echo "887daf51f8dce29c925d26ce98a02dd0b7f92d22" > "${sdk_path}/licenses/intel-android-system-image-license"
            echo "79bb43eaa2624fc1708a847bd1d61d0f5c2d8d3c" > "${sdk_path}/licenses/arm-linux-androideabi-ndk-license"
            echo "d56f5187479451eabf01fb78af6dfcb131b33910" > "${sdk_path}/licenses/ndk-license"
            echo "d56f5187479451eabf01fb78af6dfcb131b33910" > "${sdk_path}/licenses/platforms-license"
            
            # Copy android-sdk-license to all possible variant names that sdkmanager might check
            cp "${sdk_path}/licenses/android-sdk-license" "${sdk_path}/licenses/android-library-license"
            cp "${sdk_path}/licenses/android-sdk-license" "${sdk_path}/licenses/sdk-license"
            
            echo "✓ All licenses set in: $sdk_path/licenses ("$(ls "${sdk_path}/licenses" | wc -l)" files)"
          }
          
          # Ensure home licenses are set FIRST
          setup_all_licenses "$HOME/.android"
          
          # Start buildozer in background
          echo "Starting buildozer (running in background)..."
          buildozer android release -v 2>&1 | tee build.log &
          BUILD_PID=$!
          
          # Aggressively monitor and setup licenses while build runs
          echo "Monitoring build and proactively setting up licenses..."
          LICENSES_SETUP=0
          for i in {1..120}; do
            sleep 1
            
            # Check if buildozer SDK directory exists
            if [ -d "$HOME/.buildozer/android/platform/android-sdk" ] && [ $LICENSES_SETUP -eq 0 ]; then
              echo "SDK directory detected! Setting up licenses immediately..."
              setup_all_licenses "$HOME/.buildozer/android/platform/android-sdk"
              LICENSES_SETUP=1
              # Also re-setup home licenses to be sure
              setup_all_licenses "$HOME/.android"
            fi
          done &
          MONITOR_PID=$!
          
          # Wait for build to complete
          echo ""
          echo "Waiting for buildozer to complete (PID: $BUILD_PID)..."
          wait $BUILD_PID
          BUILD_EXIT_CODE=$?
          
          # Kill monitoring loop
          kill $MONITOR_PID 2>/dev/null || true
          
          echo ""
          echo "======================================"
          echo "Build finished with exit code: $BUILD_EXIT_CODE"
          echo "======================================"
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✓ BUILD SUCCESSFUL"
            echo "BUILD_SUCCESS=true" >> $GITHUB_ENV
          else
            echo "✗ BUILD FAILED"
            echo "BUILD_SUCCESS=false" >> $GITHUB_ENV
            echo ""
            echo "License files that were created:"
            find $HOME -path "*licenses*" -type f 2>/dev/null | head -20
            echo ""
            echo "Last 100 lines of build.log:"
            tail -100 build.log || echo "build.log not found"
          fi

      - name: Analyze Build Errors
        if: always()
        run: |
          echo "=== Build Error Analysis ==="
          BUILD_SUCCESS=${BUILD_SUCCESS:-false}
          echo "Build status: $BUILD_SUCCESS"
          echo ""
          
          if [ -f build.log ]; then
            if grep -qi "error\|failed\|exception" build.log; then
              echo "Found error messages in build.log:"
              echo ""
              grep -i "error\|failed\|exception" build.log | head -30
              echo ""
            fi
            
            echo "=== Last 50 lines of build.log ==="
            tail -50 build.log
          else
            echo "No build.log found"
          fi
          
          # Don't exit with error - let other steps run for cleanup
          [ "$BUILD_SUCCESS" = "true" ] || echo "⚠ Build status indicates failure"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: env.BUILD_SUCCESS == 'true'
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          tag_name: v3-build-${{ github.run_number }}-${{ github.run_attempt }}
          name: V3 Build #${{ github.run_number }}
          files: bin/*.apk
          generate_release_notes: false
          body: |
            # O-RAG v3 - Automated APK Build
            
            **Models (Download on First Launch):**
            - Qwen 3.5-2B Instruct Q4_K_M (~1.3 GB)
            - Nomic Embed Text v1.5 Q4_K_M (~80 MB)
            
            **Installation:**
            ```bash
            adb install bin/orag-*-release-unsigned.apk
            ```
            
            **First Run:**
            App will automatically download AI models (~5-10 min), then operates fully offline.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate APK file
        if: env.BUILD_SUCCESS == 'true'
        run: |
          echo "=== Searching for APK in all possible locations ==="
          echo ""
          echo "1. Checking bin/ directory:"
          ls -lh bin/ 2>/dev/null || echo "   bin/ not found"
          
          echo ""
          echo "2. Checking .buildozer/android/platform/build-[variant]/dist/:"
          find .buildozer -type d -name dist 2>/dev/null | while read dir; do
            echo "   Dist directory: $dir"
            ls -lh "$dir"/*.apk 2>/dev/null || echo "   No APK in this dist"
          done
          
          echo ""
          echo "3. Global search for all .apk files:"
          find . -name "*.apk" -type f 2>/dev/null | head -20
          
          echo ""
          echo "4. Creating apk-final directory and copying all APKs:"
          mkdir -p apk-final
          find . -name "*.apk" -type f ! -path "./.buildozer/cache/*" -exec cp {} apk-final/ \; 2>/dev/null
          
          echo "Files in apk-final/:"
          ls -lh apk-final/ || echo "No files copied"
          
          # Save the count for later
          APK_FINAL_COUNT=$(find apk-final -name "*.apk" 2>/dev/null | wc -l)
          echo "APK_FINAL_COUNT=$APK_FINAL_COUNT" >> $GITHUB_ENV
          echo "Total APKs found: $APK_FINAL_COUNT"

      - name: Upload APK as artifact
        if: env.BUILD_SUCCESS == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: orag-apk-${{ github.run_number }}
          path: |
            apk-final/*.apk
            bin/*.apk
            .buildozer/android/platform/build-*/dist/*.apk
            .buildozer/android/platform/build/dist/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Status: ${{ job.status }}"
          echo "Run: ${{ github.run_number }}"
          echo "Branch: v3"
          echo ""
          
          if [ "$BUILD_SUCCESS" == "true" ]; then
            echo "✓ BUILD SUCCESSFUL"
            if [ "$APK_FINAL_COUNT" -gt 0 ]; then
              echo "✓ APK Count: $APK_FINAL_COUNT"
              echo ""
              echo "Files:"
              ls -lh apk-final/*.apk 2>/dev/null | awk '{print "  ", $9, "(" $5 ")"}'
              echo ""
              echo "✓ Download from: Actions → orag-apk-${{ github.run_number }} → Artifacts"
            else
              echo "⚠ Build succeeded but no APK found"
            fi
          else
            echo "✗ BUILD FAILED - No APK created"
            echo "Check build-logs-${{ github.run_number }} artifact for details"
          fi
