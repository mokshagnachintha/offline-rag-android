name: V3 Build & Release APK

on:
  push:
    branches:
      - v3
  workflow_dispatch:

env:
  BUILDOZER_ANDROID_ACCEPT_SDK_LICENSE: '1'
  BUILDOZER_LOG_LEVEL: 2

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
        with:
          ref: v3
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            cmake libffi-dev libssl-dev libpng-dev

      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install "cython==0.29.37" buildozer pycryptodome

      - name: Install project dependencies
        run: |
          pip install -r requirements.txt || echo "Main requirements installed"
          pip install -r requirements_mobile.txt || echo "Mobile requirements installed"

      - name: Build APK
        run: |
          rm -rf .buildozer bin dist 2>/dev/null || true
          mkdir -p bin
          export ANDROID_SDK_ROOT=$HOME/Android/Sdk
          export ANDROID_NDK_ROOT=$HOME/Android/Ndk
          echo "Starting buildozer build..."
          buildozer android release -v 2>&1 | tee build.log || BUILD_FAILED=1
          if [ -z "$BUILD_FAILED" ]; then
            echo "✓ Build completed successfully"
          else
            echo "✗ Build failed, see details above"
          fi
          echo "BUILD_FAILED=$BUILD_FAILED" >> $GITHUB_ENV

      - name: Check APK output
        if: always()
        run: |
          echo "=== Build Diagnostics ===" 
          echo "Checking bin directory..."
          if [ -d "bin" ]; then
            echo "✓ bin directory exists"
            ls -lha bin/ || echo "Failed to list bin"
          else
            echo "✗ bin directory not found"
          fi
          
          echo ""
          echo "Searching for APK files..."
          APK_COUNT=$(find . -name "*.apk" -type f 2>/dev/null | wc -l)
          echo "Found $APK_COUNT APK file(s) total"
          
          if [ $APK_COUNT -gt 0 ]; then
            echo "✓ APK files found:"
            find . -name "*.apk" -type f 2>/dev/null | head -10
            
            # Move all APK files to bin if not already there
            find . -name "*.apk" -type f ! -path "./bin/*" -exec cp {} bin/ \;
          else
            echo "✗ No APK files found anywhere"
            echo ""
            echo "Last 30 lines of build.log:"
            tail -30 build.log || echo "No build.log found"
          fi
          
          # Final check
          ls -lh bin/*.apk 2>/dev/null || echo "No APK files in bin/"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: build.log
          retention-days: 7
          if-no-files-found: ignore

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v1
        continue-on-error: true
        with:
          tag_name: v3-build-${{ github.run_number }}-${{ github.run_attempt }}
          name: V3 Build #${{ github.run_number }}
          files: bin/*.apk
          generate_release_notes: false
          body: |
            # O-RAG v3 - Automated APK Build
            
            **Models (Download on First Launch):**
            - Qwen 3.5-2B Instruct Q4_K_M (~1.3 GB)
            - Nomic Embed Text v1.5 Q4_K_M (~80 MB)
            
            **Installation:**
            ```bash
            adb install bin/orag-*-release-unsigned.apk
            ```
            
            **First Run:**
            App will automatically download AI models (~5-10 min), then operates fully offline.
          draft: false
          prerelease: false
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Locate APK file
        if: always()
        run: |
          echo "=== Searching for APK in all possible locations ==="
          echo ""
          echo "1. Checking bin/ directory:"
          ls -lh bin/ 2>/dev/null || echo "   bin/ not found"
          
          echo ""
          echo "2. Checking .buildozer/android/platform/build-[variant]/dist/:"
          find .buildozer -type d -name dist 2>/dev/null | while read dir; do
            echo "   Dist directory: $dir"
            ls -lh "$dir"/*.apk 2>/dev/null || echo "   No APK in this dist"
          done
          
          echo ""
          echo "3. Global search for all .apk files:"
          find . -name "*.apk" -type f 2>/dev/null | head -20
          
          echo ""
          echo "4. Creating apk-final directory and copying all APKs:"
          mkdir -p apk-final
          find . -name "*.apk" -type f ! -path "./.buildozer/cache/*" -exec cp {} apk-final/ \; 2>/dev/null
          
          echo "Files in apk-final/:"
          ls -lh apk-final/ || echo "No files copied"
          
          # Save the count for later
          APK_FINAL_COUNT=$(find apk-final -name "*.apk" 2>/dev/null | wc -l)
          echo "APK_FINAL_COUNT=$APK_FINAL_COUNT" >> $GITHUB_ENV
          echo "Total APKs found: $APK_FINAL_COUNT"

      - name: Upload APK as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: orag-apk-${{ github.run_number }}
          path: |
            apk-final/*.apk
            bin/*.apk
            .buildozer/android/platform/build-*/dist/*.apk
            .buildozer/android/platform/build/dist/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Build Summary
        if: always()
        run: |
          echo "=== Build Summary ==="
          echo "Status: ${{ job.status }}"
          echo "Run: ${{ github.run_number }}"
          echo "Branch: v3"
          echo ""
          
          if [ "$APK_FINAL_COUNT" -gt 0 ]; then
            echo "✓ APK Build Status: SUCCESS"
            echo "Artifact Count: $APK_FINAL_COUNT"
            echo ""
            echo "Downloads:"
            ls -lh apk-final/*.apk 2>/dev/null | awk '{print "  ", $9, "(" $5 ")"}'
            echo ""
            echo "✓ Download from: Actions → orag-apk-${{ github.run_number }} → Artifacts"
          else
            echo "⚠ APK Build Status: INCOMPLETE"
            echo "No APK files were created or found"
            echo ""
            echo "Debug - checking for APK files anywhere:"
            find . -name "*.apk" -type f 2>/dev/null | wc -l | xargs echo "Total APK count:"
          fi
